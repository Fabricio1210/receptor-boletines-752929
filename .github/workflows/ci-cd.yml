name: CI/CD Pipeline Receptor

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f receptor/requirements.txt ]; then pip install -r receptor/requirements.txt; fi
      
      - name: Validate syntax
        run: python -m compileall . 

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: receptor-app
          path: .

  docker:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      docker_image: ${{ steps.set_image.outputs.docker_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: receptor-app
          path: .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set version tag
        id: set_image
        run: |
          VERSION_TAG="1.0.${{ github.run_number }}-${{ github.sha }}"
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$VERSION_TAG"
          echo "docker_image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "DOCKER_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker build -t receptor-image -f receptor/dockerfile receptor/
          docker tag receptor-image:latest ${{ steps.set_image.outputs.docker_image }}
          docker push ${{ steps.set_image.outputs.docker_image }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        env:
          DOCKER_IMAGE: ${{ needs.docker.outputs.docker_image }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        with:
          host: ${{ secrets.EC2_HOST_DEV }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          envs: DOCKER_IMAGE,AWS_REGION,AWS_ACCOUNT_ID
          script: |
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            export AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}

            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            
            docker stop receptor-service || true
            docker rm receptor-service || true
            
            docker pull $DOCKER_IMAGE
            docker run -d \
              --name receptor-service \
              -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
              -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
              -e AWS_SESSION_TOKEN=$AWS_SESSION_TOKEN \
              -e AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION \
              $DOCKER_IMAGE