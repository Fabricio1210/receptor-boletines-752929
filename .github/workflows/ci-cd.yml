name: CI/CD Pipeline Receptor

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f receptor/requirements.txt ]; then pip install -r receptor/requirements.txt; fi

      - name: Validate syntax
        run: python -m compileall receptor/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: receptor-app
          path: receptor/

  docker:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      docker_image: ${{ steps.set_image.outputs.docker_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: receptor-app
          path: ./receptor

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Docker image name
        id: set_image
        run: |
          VERSION_TAG="1.0.${{ github.run_number }}-${{ github.sha }}"
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$VERSION_TAG"
          echo "docker_image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build -t receptor-image -f receptor/dockerfile receptor/
          docker tag receptor-image:latest ${{ steps.set_image.outputs.docker_image }}
          docker push ${{ steps.set_image.outputs.docker_image }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Set up SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > /tmp/ssh_key.pem
          chmod 600 /tmp/ssh_key.pem

      - name: Deploy to EC2
        run: |
          DOCKER_IMAGE="${{ needs.docker.outputs.docker_image }}"
          LOGIN_COMMAND=$(aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} --access-key-id ${{ secrets.AWS_ACCESS_KEY_ID }} --secret-access-key ${{ secrets.AWS_SECRET_ACCESS_KEY }} --session-token ${{ secrets.AWS_SESSION_TOKEN }})
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_DEV }} << EOF
            # Hacer login usando el token obtenido por el runner
            echo "$LOGIN_COMMAND" | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
            docker stop receptor-service || true
            docker rm receptor-service || true
            docker pull $DOCKER_IMAGE
            docker run -d \
              --name receptor-service \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              -e AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }} \
              $DOCKER_IMAGE
          EOF